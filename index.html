<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dark Pixel Dungeon</title>

<style>
body {
    background: black;
    color: lime;
    font-family: monospace;
    margin: 0;
}

#layout {
    display: flex;
    height: 100vh;
}

#left, #right {
    width: 20%;
    padding: 10px;
    border-right: 1px solid lime;
}

#right {
    border-left: 1px solid lime;
    border-right: none;
}

#center {
    width: 60%;
    display: flex;
    flex-direction: column;
}

#terminal {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    white-space: pre-line;
}

input {
    padding: 10px;
    background: black;
    color: lime;
    border: none;
    outline: none;
}

/* INPUT FIXO (tipo chat) */
input {
    position: sticky;
    bottom: 0;
    font-size: 16px;
}

#player, #enemy, #inventory {
    margin-bottom: 15px;
    padding: 10px;
    border: 1px solid lime;
}

.box {
    padding: 10px;
    margin: 10px 0;
    border: 1px solid lime;
}

.evento {
    background: darkgreen;
    color: yellow;
}

.combate {
    background: darkred;
    color: yellow;
}

.linha {
    margin: 5px 0;
}

/* 📱 MODO MOBILE */
@media (max-width: 768px) {

    #layout {
        flex-direction: column;
        height: auto;
    }

    #left, #right, #center {
        width: 100%;
        border: none;
    }

    #left {
        order: 1;
    }

    #center {
        order: 2;
    }

    #right {
        order: 3;
    }

    #terminal {
        height: 50vh;
    }

}
</style>
</head>

<body>

<div id="layout">
    <div id="left">
        <div id="player"></div>
        <div id="enemy"></div>
    </div>

    <div id="center">
        <div id="terminal"></div>
        <input id="input" placeholder="Digite um comando..." autofocus>
    </div>

    <div id="right">
        <div id="inventory"></div>
    </div>
</div>

<script>
let term = document.getElementById("terminal");
let input = document.getElementById("input");

let player = {
    nome: "",
    classe: "Aventureiro",
    nivel: 1,
    xp: 0,
    hp: 30,
    mana: 10,
    gold: 0,
    vitorias: 0,
    itensObtidos: [],

    dados: [
        {
            nome: "Ataque",
            tipo: "atk",
            faces: 6,
            critChance: 10,
            critMulti: 2
        },
        {
            nome: "Defesa",
            tipo: "def",
            faces: 6,
            bloqueioBonus: 0
        }
    ],

    inventario: [],

    equipamentos: [] // 👈 AQUI
};

let enemy = null;
let enemyIntent = null;
let modo = "menu";
let resultados = [];
let eventoAtual = null;
let inicioJogo = Date.now();
let salvarSlot = "1";
let fase = 0;
let rerolls = 0;
let maxRerolls = 2;

// HUD
function atualizarHUD() {

    let eqTexto = player.equipamentos.map(e => e.nome + " (+" + e.dano + ")").join(", ");

    let dadosTexto = player.dados.map((d, i) => {
        let info = `🎲 ${d.nome} (${d.tipo}) d${d.faces}`;

        if (d.critChance) {
            info += ` | Crit: ${d.critChance}% x${d.critMulti}`;
        }

        if (d.bloqueioBonus) {
            info += ` | Block +${d.bloqueioBonus}`;
        }

        return info;
    }).join("\n");

    document.getElementById("player").innerText =
    "👤 " + (player.nome || "Sem Nome") +
    "\n🏷️ Classe: " + player.classe +
    "\n❤️ HP: " + player.hp +
    "\n🔮 Mana: " + player.mana +
    "💰 Ouro: " + player.gold +
    "\n📍 Fase: " + fase +
    "\n🎲 Rerolls: " + (maxRerolls - rerolls) + "/" + maxRerolls +
    "\n⚔️ Equip: " + (eqTexto || "Nenhum") +
    "\n\n" +
    "📊 DADOS:\n" +
    dadosTexto;

    document.getElementById("inventory").innerText =
        "🎒 " + (player.inventario.length ? player.inventario.join(", ") : "Vazio");

    if (modo === "combate" && enemy) {
        document.getElementById("enemy").innerText =
            "👾 " + enemy.nome + "\nHP: " + enemy.hp;
    } else {
        document.getElementById("enemy").innerText = "";
    }
}

// TERMINAL
function print(txt, classe="") {
    let div = document.createElement("div");
    div.className = classe + " linha";
    div.innerText = txt;

    term.appendChild(div);
    term.scrollTop = term.scrollHeight;

    atualizarHUD();
}

// INPUT
input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let cmd = input.value.toLowerCase();
        print("> " + cmd);

        // BLOQUEIO GAME OVER
        if (modo === "gameover") {
            if (cmd === "menu") location.reload();
            input.value = "";
            return;
        }

        // MENU (SLOTS)
        if (modo === "menu") {

            // 🔴 DELETAR SAVE
            if (cmd.startsWith("del ")) {
                let slot = cmd.split(" ")[1];
                deletarSave(slot);
                input.value = "";
                return;
            }

            salvarSlot = cmd;

            let carregou = carregarJogo(cmd);

            if (!carregou) {
                print("Digite seu nome:", "evento");
                modo = "novo_nome";
            }

            input.value = "";
            return;
        }

        // NOVO JOGADOR
        if (modo === "novo_nome") {
            player.nome = cmd;
            inicioJogo = Date.now();

            print("Bem-vindo, " + player.nome + "!");
            print("Digite 'explorar' para começar...", "evento");

            modo = "explorando";
            input.value = "";
            return;
        }

        // JOGO NORMAL
        interpretar(cmd);
        input.value = "";
    }
});

// GAME OVER CORRIGIDO
function gameOver() {
    modo = "gameover";

    let tempo = Math.floor((Date.now() - inicioJogo) / 1000);

    print("☠️ GAME OVER", "box combate");
    print("Tempo: " + tempo + "s", "combate");
    print("Nível: " + player.nivel, "combate");
    print("Vitórias: " + player.vitorias, "combate");
    print("Itens: " + (player.itensObtidos.join(", ") || "Nenhum"), "combate");
    print("Digite 'menu' para voltar", "evento");
}

// INTERPRETADOR
function interpretar(cmd) {

    if (modo === "explorando") {
        if (cmd === "explorar") proximaSala();
        else if (cmd === "salvar") salvarJogo();
        else if (cmd === "status") print("HP: " + player.hp);
        else print("Comandos: explorar, status");
    }

    else if (modo === "evento") {
        if (!eventoAtual) return;
        let opcao = eventoAtual.opcoes[cmd];
        if (opcao) opcao();
        else print("Escolha válida: " + Object.keys(eventoAtual.opcoes).join(", "));
    }

    else if (modo === "combate") {
    if (cmd === "rolar") rolarDados();
    else if (cmd.startsWith("usar")) usarDados(cmd);
    else if (cmd === "fugir") tentarFuga(); // 👈 NOVO
    else print("Comandos: rolar, usar 0 1, fugir");
}

    atualizarHUD();
}

function tentarFuga() {

    let dadoDef = player.dados.find(d => d.tipo === "def");

    if (!dadoDef) {
        print("❌ Você não tem como fugir!", "evento");
        return;
    }

    let roll = Math.floor(Math.random() * dadoDef.faces) + 1;

    let dificuldade = 4;

    print("🎲 Tentando fugir... (" + roll + ")", "evento");

    if (roll >= dificuldade) {
        print("🏃 Você fugiu!", "evento");
        modo = "explorando";
    } else {
        print("❌ Falhou em fugir!", "combate");

        let atk = enemyIntent.valor;
        player.hp -= atk;

        print("Inimigo causou " + atk);

        if (player.hp <= 0) {
            gameOver();
        } else {
            definirIntento();
        }
    }
}

// SALAS
function proximaSala() {
    fase++;

    print("📍 Fase " + fase, "evento");

    // A cada 4 fases → evento especial
    if (fase % 4 === 0) {
        eventoEspecial();
        return;
    }

    // Fases normais
    let roll = Math.random();

    if (roll < 0.65) iniciarCombate();      
else if (roll < 0.80) eventoDescanso(); 
else if (roll < 0.90) eventoLoja();
else {
    let evento = eventos[Math.floor(Math.random() * eventos.length)];
    evento();
}
}

// INIMIGOS
function gerarInimigo() {
    let inimigos = [
        {nome: "Goblin", hp: 10, atk: [2,4], gold: [5,10]},
        {nome: "Esqueleto", hp: 20, atk: [3,7], gold: [8,15]},
        {nome: "Slime Sombrio", hp: 10, atk: [2,6], gold: [4,7]},
        {nome: "Slime", hp: 6, atk: [2,6], gold: [2,4]},
        {nome: "K'Lonthar", hp: 20, atk: [1,10], gold: [7,10]},
        {nome: "Veldriniano saqueador", hp: 24, atk: [5,8], gold: [1,20]},
        {nome: "Esqueleto Pirata", hp: 15, atk: [6,10], gold: [10,15]}
    ];
    return inimigos[Math.floor(Math.random() * inimigos.length)];
}

// COMBATE
function iniciarCombate() {
    modo = "combate";
    enemy = gerarInimigo();

    rerolls = 0;

    print("⚔️ Você encontrou: " + enemy.nome, "box combate");
    
    definirIntento();
    
    print("Comandos: rolar, fugir", "combate");
}

function rolarDados() {

    // 🚫 bloqueio de reroll
    if (resultados.length > 0 && rerolls >= maxRerolls) {
        print("❌ Você não pode mais rerolar!", "evento");
        return;
    }

    // 🔁 se já rolou antes, conta como reroll
    if (resultados.length > 0) {
        rerolls++;
        print("🔁 Reroll usado (" + rerolls + "/" + maxRerolls + ")", "evento");
    }

    resultados = [];

    player.dados.forEach((d, i) => {
        let val = Math.floor(Math.random() * d.faces) + 1;
        resultados.push({d, val});
        print("[" + i + "] " + d.nome + " → " + val, "combate");
    });

    print("Use: usar 0 1", "combate");
}

function usarDados(cmd) {
    let partes = cmd.split(" ").slice(1);
    let dano = 0;
    let defesa = 0;

    partes.forEach(p => {
        let i = parseInt(p);
        if (resultados[i]) {
            let d = resultados[i].d;
            let v = resultados[i].val;

            if (d.tipo === "atk") {
    let bonus = player.equipamentos.reduce((soma, eq) => soma + eq.dano, 0);
    dano += v + bonus;
}
            if (d.tipo === "crit") dano += v * 2;
            if (d.tipo === "def") defesa += v;
        }
    });

    enemy.hp -= dano;
    print("Você causou " + dano);

    if (enemy.hp <= 0) {
        let ganho = rand(enemy.gold);
        player.gold += ganho;
        player.vitorias++;

        print("Você venceu! Ganhou " + ganho + " ouro");
        modo = "explorando";
        return;
    }

    let atk = enemyIntent.valor;
    let danoFinal = Math.max(0, atk - defesa);

    player.hp -= danoFinal;

    print("Inimigo causou " + atk);
    print("Você bloqueou " + defesa);
    print("Dano recebido: " + danoFinal);

    if (player.hp <= 0) {
    gameOver();
} else {

    rerolls = 0;        // 👈 RESET AQUI
    resultados = [];    // 👈 LIMPA DADOS ANTIGOS (IMPORTANTE)

    print("Digite: rolar");
    definirIntento();
}
}

function definirIntento() {
    let tipos = ["ataque", "ataque_forte"];
    let tipo = tipos[Math.floor(Math.random() * tipos.length)];

    let valor = rand(enemy.atk);
    if (tipo === "ataque_forte") valor += 2;

    enemyIntent = { tipo, valor };
    mostrarIntento();
}

function mostrarIntento() {
    if (enemyIntent.tipo === "ataque")
        print("👁️ Inimigo vai atacar causando " + enemyIntent.valor, "combate");

    if (enemyIntent.tipo === "ataque_forte")
        print("💀 Inimigo prepara ataque FORTE (" + enemyIntent.valor + ")", "combate");
}

// EVENTOS (INTACTOS)
let eventos = [
    () => velho(),
    () => bau(),
    () => altar(),
    () => eventoArma()
];

function velho() {
    modo = "evento";
    
    eventoAtual = {
        opcoes: {
            "1": () => {
    print("Você ganhou dado crítico!");
    player.hp -= 5;

    if (player.hp <= 0) {
        gameOver();
        return;
    }

    adicionarDadoSeguro({nome: "Crítico", tipo: "crit", faces: 8});
    modo = "explorando";
            }
        }
    };

    print("Velho misterioso:", "box evento");
    print("1 - Aceitar poder (-5 HP, ganha dado)", "evento");
    print("2 - Recusar", "evento");
}

function bau() {
    modo = "evento";

    eventoAtual = {
        opcoes: {
            "1": () => {

                // 🎲 CHANCE DE MÍMICO
                let chanceMimico = Math.random();

                if (chanceMimico < 0.25) { 
                    // 25% de chance de ser mimico
                    print("💀 O baú era um MÍMICO!", "box combate");

                    modo = "combate";
                    enemy = {
                        nome: "Mímico",
                        hp: 25,
                        atk: [4, 8],
                        gold: [10, 20]
                    };

                    definirIntento();
                    print("⚔️ Início de combate!", "combate");
                    print("Digite: rolar", "combate");

                    return;
                }

                // 🎁 BAÚ NORMAL
                let ouro = rand([5, 15]);
                player.gold += ouro;
                print("🪙 Você encontrou " + ouro + " ouro!");

                modo = "explorando";
            },

            "2": () => {
                print("Você ignorou o baú.");
                modo = "explorando";
            }
        }
    };

    print("📦 Você encontrou um baú:", "box evento");
    print("1 - Abrir", "evento");
    print("2 - Ignorar", "evento");
}

function altar() {
    modo = "evento";

    eventoAtual = {
        opcoes: {
            "1": () => {
    player.hp -= 10;
    player.gold += 20;

    if (player.hp <= 0) {
        gameOver();
        return;
    }

    print("Sacrifício feito...");
    modo = "explorando";
}
        }
    };

    print("Um altar sombrio:", "box evento");
    print("1 - Sacrificar 10 HP por 20 ouro", "evento");
    print("2 - Sair", "evento");
}

function eventoDescanso() {
    modo = "evento";

    eventoAtual = {
        opcoes: {
            "1": () => {
                player.hp += 10;
                print("Você descansou (+10 HP)");
                modo = "explorando";
            },
            "2": () => {
    print("Você decide continuar seguindo seu caminho em sua aventura...");
    modo = "explorando";
}
        }
    };

    print("Área segura:", "box evento");
    print("1 - Descansar", "evento");
    print("2 - Seguir", "evento");
}

function eventoLoja() {
    modo = "evento";

    eventoAtual = {
        opcoes: {
            "1": () => {
                if (player.gold >= 15) {
                    player.gold -= 15;
                    player.hp += 10;
                    print("Você comprou cura!");
                } else print("Ouro insuficiente");
                modo = "explorando";
            },
            "2": () => {
                if (player.gold >= 20) {
                    player.gold -= 20;
                    adicionarDadoSeguro({nome:"Ataque+", tipo:"atk", faces:8});
                    print("Novo dado adquirido!");
                } else print("Ouro insuficiente");
                modo = "explorando";
            },
            "3": () => {
    print("Você ignora a loja e segue seu caminho...");
    modo = "explorando";
}
        }
    };

    print("Loja:", "box evento");
    print("1 - Cura (15 ouro)", "evento");
    print("2 - Dado melhor (20 ouro)", "evento");
    print("3 - Sair", "evento");
}
function eventoEspecial() {
    modo = "evento";

    let eventos = [
    () => eventoRelicario(),
    () => eventoBencao(),
    () => eventoMaldicao(),
    () => eventoNada()
];
function eventoNada() {
    print("Nada acontece... apenas silêncio.", "evento");
    modo = "explorando";
}

    eventos.sort(() => Math.random() - 0.5);

    eventoAtual = {
        opcoes: {
            "1": () => { eventos[0](); },
            "2": () => { eventos[1](); },
            "3": () => { eventos[2](); }
        }
    };

    print("✨ Evento Especial!", "box evento");
    print("Escolha um destino:", "evento");
    print("1 - Caminho misterioso", "evento");
    print("2 - Poder desconhecido", "evento");
    print("3 - Risco sombrio", "evento");
}
function eventoRelicario() {
    print("Você encontrou um relicário antigo...", "evento");
    adicionarDadoSeguro({nome:"Relíquia", tipo:"atk", faces:10});
    print("Ganhou um dado poderoso!");
    modo = "explorando";
}

function eventoBencao() {
    print("Uma luz envolve você...", "evento");
    player.hp += 15;
    print("Você recuperou 15 HP!");
    modo = "explorando";
}

function eventoMaldicao() {
    print("Uma presença sombria te marca...", "evento");
    player.hp -= 10;
    player.gold += 30;

    if (player.hp <= 0) {
        gameOver();
        return;
    }

    print("Você perdeu HP, mas ganhou ouro!");
    modo = "explorando";
}
function eventoArma() {
    print("Você encontrou uma arma!", "evento");

    let arma = {
        nome: "Espada Enferrujada",
        dano: 2
    };

    if (player.equipamentos.length >= 3) {
    print("Você não pode carregar mais equipamentos!", "evento");
} else {
    player.equipamentos.push(arma);
}

    print("Ganhou: " + arma.nome + " (+" + arma.dano + " dano)");

    modo = "explorando";
}

// UTIL
function rand(arr) {
    return Math.floor(Math.random() * (arr[1] - arr[0] + 1)) + arr[0];
}
function salvarJogo() {
    let save = {
        player: player,
        fase: fase,
        tempo: Date.now() - inicioJogo
    };

    localStorage.setItem("save_" + salvarSlot, JSON.stringify(save));
    print("💾 Jogo salvo no slot " + salvarSlot, "evento");
}

function carregarJogo(slot) {
    let save = localStorage.getItem("save_" + slot);

    if (!save) {
        print("⚠️ Slot vazio!", "evento");
        return false;
    }

    let data = JSON.parse(save);

    player = data.player;
    fase = data.fase;
    inicioJogo = Date.now() - data.tempo;

    print("📂 Save carregado!", "evento");

    modo = "explorando";
    return true;
}
function deletarSave(slot) {
    let existe = localStorage.getItem("save_" + slot);

    if (!existe) {
        print("⚠️ Slot já está vazio!", "evento");
        return;
    }

    let confirmar = confirm("Tem certeza que deseja apagar este save?");

    if (confirmar) {
        localStorage.removeItem("save_" + slot);
        print("🗑️ Save do slot " + slot + " apagado!", "evento");

        term.innerHTML = "";
        menuInicial();
    } else {
        print("Cancelado.", "evento");
    }
}

function adicionarDadoSeguro(dado) {
    if (player.dados.length >= 5) {
        print("Você já tem muitos dados!", "evento");
        return;
    }

    player.dados.push(dado);
    print("Novo dado adicionado: " + dado.nome + " d" + dado.faces, "evento");
}

// INÍCIO
menuInicial();
atualizarHUD();
function menuInicial() {
    modo = "menu";

    print("=== DARK PIXEL DUNGEON ===", "box evento");
    print("Escolha um slot:", "evento");

    for (let i = 1; i <= 3; i++) {
        let save = localStorage.getItem("save_" + i);

        if (save) {
            let data = JSON.parse(save);
            let tempo = Math.floor(data.tempo / 1000);

            print(i + " - " + data.player.nome + " | ⏱ " + tempo + "s | Fase " + data.fase, "evento");
        } else {
            print(i + " - [Vazio]", "evento");
        }
    }

    print("Digite o número do slot:", "evento");
    
}
</script>

</body>
</html>
